version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: coffmunnity-web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: coffmunnity-app
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env